name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Build Windows installer ─────────────────────────────────────────────────
  release-windows:
    name: Release Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure Windows Authenticode signing identity
        shell: pwsh
        env:
          HEXHAWK_CODESIGN_PFX_BASE64: ${{ secrets.HEXHAWK_CODESIGN_PFX_BASE64 }}
          HEXHAWK_CODESIGN_PFX_PATH_SECRET: ${{ secrets.HEXHAWK_CODESIGN_PFX_PATH }}
        run: |
          if ($env:HEXHAWK_CODESIGN_PFX_BASE64) {
            $pfxPath = Join-Path $env:RUNNER_TEMP "hexhawk-codesign.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:HEXHAWK_CODESIGN_PFX_BASE64))
            Add-Content -LiteralPath $env:GITHUB_ENV -Value "HEXHAWK_CODESIGN_PFX_PATH=$pfxPath"
          } elseif ($env:HEXHAWK_CODESIGN_PFX_PATH_SECRET) {
            Add-Content -LiteralPath $env:GITHUB_ENV -Value "HEXHAWK_CODESIGN_PFX_PATH=$env:HEXHAWK_CODESIGN_PFX_PATH_SECRET"
          }

      - name: Official Windows build, updater signature, and Authenticode signing
        shell: pwsh
        run: ./scripts/release/build-official-windows-release.ps1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          HEXHAWK_CODESIGN_THUMBPRINT: ${{ secrets.HEXHAWK_CODESIGN_THUMBPRINT }}
          HEXHAWK_CODESIGN_PFX_PASSWORD: ${{ secrets.HEXHAWK_CODESIGN_PFX_PASSWORD }}

      - name: Upload release assets (Windows)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error

  # ── Build macOS DMG ──────────────────────────────────────────────────────────
  release-macos:
    name: Release macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Tauri app (universal binary)
        run: yarn tauri:build --target universal-apple-darwin
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release assets (macOS)
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: bundle-macos
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ── Build Linux AppImage ─────────────────────────────────────────────────────
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        run: yarn tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release assets (Linux)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
          if-no-files-found: error

  # ── Prepare website release payload (latest.json + checksums + hosted assets) ─────────
  prepare-website-release:
    name: Prepare Website Release Payload
    runs-on: ubuntu-latest
    needs: [release-windows, release-macos, release-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: target/release/bundle
          merge-multiple: true

      - name: Generate website release files
        shell: pwsh
        run: |
          ./prepare-release.ps1 -Version "${{ steps.version.outputs.VERSION }}" -UseLocalReleaseFiles -TauriUpdaterMetadata -ReleaseNotes "HexHawk ${{ github.ref_name }} release candidate. Verify release evidence before distribution."

      - name: Validate generated updater metadata payload
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -LiteralPath "target/release/bundle/nsis" -Filter "*.exe" | Sort-Object Name | Select-Object -First 1
          if (-not $nsis) { throw "Missing NSIS installer for updater metadata validation." }
          $sigPath = "$($nsis.FullName).sig"
          if (-not (Test-Path -LiteralPath $sigPath)) { throw "Missing NSIS updater signature: $sigPath" }
          $artifactSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $nsis.FullName).Hash.ToLowerInvariant()
          $signatureSha256 = [BitConverter]::ToString([Security.Cryptography.SHA256]::Create().ComputeHash([Text.Encoding]::UTF8.GetBytes((Get-Content -LiteralPath $sigPath -Raw)))).Replace("-", "").ToLowerInvariant()
          ./scripts/release/validate-updater-metadata.ps1 -MetadataUrl "file:///${{ github.workspace }}/site-build/releases/latest.json" -ExpectedVersion "${{ steps.version.outputs.VERSION }}" -ExpectedArtifactSha256 $artifactSha256 -ExpectedSignatureSha256 $signatureSha256 -AllowLocalFileAsset

      - name: Upload website payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-release-payload
          path: |
            site-build/releases/latest.json
            site-build/releases/v${{ steps.version.outputs.VERSION }}/**
            site-build/trust/**
            site-build/.well-known/hexhawk-trust.json
          if-no-files-found: error

  # ── Create GitHub Release (draft) ────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [release-windows, release-macos, release-linux, prepare-website-release]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Finalize GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            ## HexHawk ${{ github.ref_name }}

            ### Installers
            | Platform | Format | Notes |
            |----------|--------|-------|
            | Windows | `.msi` (WiX) | Recommended |
            | Windows | `.exe` (NSIS) | Alternative |
            | macOS | `.dmg` | Universal binary (Intel + Apple Silicon) |
            | Linux | `.AppImage` | No install required |
            | Linux | `.deb` | Debian / Ubuntu |

            ### Update Signature
            Installers are signed with a Tauri update key. Public key is in `tauri.conf.json`.

            ### Checksums
            SHA-256 checksums are available in the release assets.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
