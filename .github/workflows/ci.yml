name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install npm workspace
        run: npm install

      - name: Build frontend package
        run: npm --workspace HexHawk run build

      - name: Build Rust workspace
        run: cargo build --workspace --release

      - name: Package Tauri app
        run: npm --workspace HexHawk run tauri:build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hexhawk-artifacts-${{ matrix.os }}
          path: |
            HexHawk/target/release/bundle/**/*
            target/release/**/*
